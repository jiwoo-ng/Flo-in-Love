<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FloinLove - Flower Community</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Header / Navigation -->
  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo">FloinLove</a>
      <button class="btn-new-post" id="btnNewPost" aria-label="Write a post">+</button>
    </div>
  </header>

  <!-- New Post Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2>New Post</h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <form id="newPostForm">
        <input type="text" id="postTag" placeholder="#hashtag (e.g. #roses)" required>
        <div class="textarea-wrap">
          <textarea id="postContent" rows="4" placeholder="Share your flower moment..." required maxlength="3000"></textarea>
          <span class="word-counter" id="wordCounter">500 words left</span>
        </div>
        <label class="upload-area" id="uploadArea">
          <input type="file" id="postImageFile" accept="image/*" hidden>
          <div class="upload-placeholder" id="uploadPlaceholder">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            <span>Tap to upload a photo</span>
          </div>
          <img id="uploadPreview" class="upload-preview" src="" alt="Preview" style="display:none;">
        </label>
        <button type="submit" class="btn-submit">Post</button>
      </form>
    </div>
  </div>

  <!-- Edit Post Modal -->
  <div class="modal-overlay" id="editModalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Edit Post</h2>
        <button class="modal-close" id="editModalClose">&times;</button>
      </div>
      <form id="editPostForm">
        <input type="hidden" id="editPostId">
        <input type="text" id="editPostTag" placeholder="#hashtag" required>
        <textarea id="editPostContent" rows="4" placeholder="Update your post..." required></textarea>
        <label class="upload-area" id="editUploadArea">
          <input type="file" id="editPostImageFile" accept="image/*" hidden>
          <div class="upload-placeholder" id="editUploadPlaceholder">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            <span>Tap to change photo</span>
          </div>
          <img id="editUploadPreview" class="upload-preview" src="" alt="Preview" style="display:none;">
        </label>
        <button type="submit" class="btn-submit">Save</button>
      </form>
    </div>
  </div>

  <!-- Pages -->
  <main class="page active" id="pageHome">
    <div class="feed" id="feed"></div>
  </main>

  <main class="page" id="pageFind">
    <div class="find-container">
      <div class="search-bar">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search by tag, author, or keyword...">
      </div>
      <div class="find-tags" id="findTags"></div>
      <div class="find-grid" id="findGrid"></div>
    </div>
  </main>

  <main class="page" id="pageProfile">
    <div class="profile-container">
      <div class="profile-header">
        <div class="profile-avatar-wrap" id="profileAvatarWrap">
          <img class="profile-avatar" id="profileAvatarImg" src="https://i.pravatar.cc/150?img=50" alt="You">
          <div class="avatar-edit-overlay" id="avatarEditOverlay">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </div>
          <input type="file" id="avatarFileInput" accept="image/*" hidden>
        </div>
        <div class="profile-info">
          <h2 class="profile-name">You</h2>
          <p class="profile-bio">Flower enthusiast & nature lover</p>
        </div>
        <div class="profile-actions">
          <button class="follow-btn profile-follow-btn following" id="profileFollowBtn">
            <svg class="daisy-icon" viewBox="0 0 24 24" width="16" height="16"><circle cx="12" cy="12" r="3" fill="currentColor"/><ellipse cx="12" cy="4.5" rx="2.2" ry="3.5" fill="currentColor" opacity=".85"/><ellipse cx="12" cy="19.5" rx="2.2" ry="3.5" fill="currentColor" opacity=".85"/><ellipse cx="4.5" cy="12" rx="3.5" ry="2.2" fill="currentColor" opacity=".85"/><ellipse cx="19.5" cy="12" rx="3.5" ry="2.2" fill="currentColor" opacity=".85"/><ellipse cx="6.7" cy="6.7" rx="2.2" ry="3.5" transform="rotate(45 6.7 6.7)" fill="currentColor" opacity=".85"/><ellipse cx="17.3" cy="17.3" rx="2.2" ry="3.5" transform="rotate(45 17.3 17.3)" fill="currentColor" opacity=".85"/><ellipse cx="17.3" cy="6.7" rx="2.2" ry="3.5" transform="rotate(-45 17.3 6.7)" fill="currentColor" opacity=".85"/><ellipse cx="6.7" cy="17.3" rx="2.2" ry="3.5" transform="rotate(-45 6.7 17.3)" fill="currentColor" opacity=".85"/></svg>
            <span class="follow-label">Following</span>
          </button>
          <button class="profile-message-btn" id="profileMessageBtn">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span>Message</span>
          </button>
        </div>
      </div>
      <div class="profile-stats">
        <div class="stat"><span class="stat-num" id="statPosts">0</span><span class="stat-label">Posts</span></div>
        <div class="stat"><span class="stat-num" id="statLikes">0</span><span class="stat-label">Likes</span></div>
        <button class="stat stat-btn" id="statFollowersBtn">
          <span class="stat-num" id="statFollowers">128</span>
          <span class="stat-label">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            Followers
          </span>
        </button>
        <button class="stat stat-btn" id="statFollowingBtn">
          <span class="stat-num" id="statFollowing">64</span>
          <span class="stat-label">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
            Following
          </span>
        </button>
      </div>
      <h3 class="profile-section-title">My Posts</h3>
      <div class="feed" id="profileFeed"></div>
      <p class="empty-state" id="emptyProfile">You haven't posted yet. Tap + to share your first flower moment!</p>
    </div>
  </main>

  <!-- Footer Navigation -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-page="pageHome" aria-label="Home">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-btn" data-page="pageFind" aria-label="Find">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <span class="nav-label">Find</span>
    </button>
    <button class="nav-btn" data-page="pageProfile" aria-label="My Page">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span class="nav-label">My Page</span>
    </button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
